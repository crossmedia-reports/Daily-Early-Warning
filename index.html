<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acces Securizat - Crossmedia</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e6f0fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 90, 180, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo-box {
            margin-bottom: 25px;
        }
        .logo-box img {
            max-width: 220px;
            height: auto;
        }
        h1 {
            font-size: 1.4rem;
            color: #1e3a5f;
            margin: 0 0 10px 0;
            font-weight: 700;
        }
        p {
            color: #607d8b;
            font-size: 0.95rem;
            margin: 0 0 25px 0;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 2px solid #cfd8dc;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #ff6d00;
        }
        button {
            background-color: #ff6d00;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #e65100;
        }
        button:active {
            transform: scale(0.98);
        }
        .error {
            color: #d32f2f;
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
        }
        #protected-content {
            display: none;
        }
        .unlocked-body {
            display: block !important;
            background-color: transparent !important;
            padding: 0 !important;
        }
        .unlocked-container {
            max-width: 100% !important;
            box-shadow: none !important;
            padding: 0 !important;
            background: transparent !important;
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="login-zone">
        <div class="logo-box">
            <img src="sigla.png" alt="Crossmedia Logo">
        </div>
        <h1>Conținut Protejat</h1>
        <p>Introduceți parola pentru a decripta dashboard-ul.</p>
        <input type="password" id="password-input" placeholder="Parola..." onkeypress="handleKeyPress(event)">
        <button onclick="unlockContent()">Accesează Datele</button>
        <div id="error-msg" class="error">Parolă incorectă! Încercați din nou.</div>
    </div>
    <div id="protected-content"></div>
</div>

    const passP = "Maspex2026";

    function handleKeyPress(e) {
        if (e.keyCode === 13) {
            unlockContent();
        }
    }

    function unlockContent() {
        const password = document.getElementById('password-input').value;
        const errorMsg = document.getElementById('error-msg');
        
        if (password === passP) {
            try {
                const reversedData = dataP.split("").reverse().join("");
                const decodedText = decodeURIComponent(escape(atob(reversedData)));
                
                document.getElementById('login-zone').remove();
                document.body.classList.add('unlocked-body');
                document.getElementById('main-container').classList.add('unlocked-container');
                
                const contentDiv = document.getElementById('protected-content');
                contentDiv.style.display = 'block';
                
                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '100vh';
                iframe.style.border = 'none';
                contentDiv.appendChild(iframe);
                
                const idoc = iframe.contentWindow.document;
                idoc.open();
                idoc.write(decodedText);
                idoc.close();
            } catch (err) {
                errorMsg.style.display = 'block';
            }
        } else {
            errorMsg.style.display = 'block';
        }
    }
